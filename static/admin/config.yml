backend:
  name: github
  repo: Maoxin1/mantou-blog
  branch: main
  base_url: https://decap-proxy.xmiao2343.workers.dev
  auth_endpoint: /auth

media_folder: "static/images/posts"
public_folder: "/images/posts"

collections:
  - name: "posts"
    label: "Posts"
    folder: "content/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - label: "Body"
        name: "body"
        widget: "markdown"
        buttons: ["bold", "italic", "link", "image", "quote", "code", "bulleted-list", "numbered-list"]
        editor_components: ["image", "code-block"]
