backend:
  name: github
  repo: Maoxin1/mantou-blog
  branch: main
  base_url: https://decap-proxy.xmiao2343.workers.dev
  auth_endpoint: /auth

media_folder: "static/images/posts"
public_folder: "/images/posts"

collections:
  - name: "posts"
    label: "Posts"
    folder: "content/posts"
    create: true
    slug: "{{fields.date}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, picker_utc: false }
      - { label: "摘要", name: "description", widget: "text", required: false }
      - { label: "标签", name: "tags", widget: "list", required: false }
      - label: "Body"
        name: "body"
        widget: "markdown"