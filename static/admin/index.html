+<!doctype html>
+<html>
+  <head>
+    <meta charset="utf-8" />
+    <meta name="viewport" content="width=device-width, initial-scale=1" />
+    <title>Content Manager</title>
+    <style>
+      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; }
+      #cms-loading { padding: 16px; color: #444; }
+      #cms-error { display: none; padding: 16px; color: #b00020; line-height: 1.6; }
+      code { background: #f6f8fa; padding: 2px 4px; border-radius: 4px; }
+    </style>
+  </head>
+  <body>
+    <div id="cms-loading">Loading Decap CMS...</div>
+    <div id="cms-error">
+      Decap CMS 脚本加载失败。请先关闭广告拦截插件，或检查网络是否拦截 CDN：
+      <code>unpkg.com</code> / <code>cdn.jsdelivr.net</code>。
+    </div>
+
+    <script>
+      (function loadCMS() {
+        var loading = document.getElementById('cms-loading');
+        var error = document.getElementById('cms-error');
+
+        function done() {
+          if (loading) loading.style.display = 'none';
+        }
+
+        function fail() {
+          if (loading) loading.style.display = 'none';
+          if (error) error.style.display = 'block';
+        }
+
+        function appendScript(src, onload, onerror) {
+          var script = document.createElement('script');
+          script.src = src;
+          script.onload = onload;
+          script.onerror = onerror;
+          document.body.appendChild(script);
+        }
+
+        appendScript(
+          'https://unpkg.com/decap-cms@^3/dist/decap-cms.js',
+          done,
+          function () {
+            appendScript(
+              'https://cdn.jsdelivr.net/npm/decap-cms@^3/dist/decap-cms.js',
+              done,
+              fail
+            );
+          }
+        );
+      })();
+    </script>
+  </body>
+</html>
