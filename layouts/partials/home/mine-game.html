 {{/* Minecraft 风像素挖矿 banner —— 挖到宝藏跳转随机文章 */}}
  <div id="mantou-mine" aria-label="像素挖矿小游戏">
    <canvas id="mine-canvas" width="512" height="160"
            role="img" aria-label="点击方块挖矿"></canvas>
    <div id="mine-hint">⛏️ 点击方块挖矿 · 挖到宝藏会跳到一篇随机文章</div>
    <div id="mine-popup"></div>
  </div>

  <style>
  #mantou-mine{
    margin: 1.2rem auto 0;
    max-width: 560px;
    text-align: center;
    font-family: ui-monospace, "Cascadia Mono", Menlo, monospace;
    user-select: none;
  }
  #mine-canvas{
    display:block;
    margin: 0 auto;
    width: 100%;
    max-width: 512px;
    height: auto;
    border: 3px solid #2c2c2c;
    background: #87CEEB;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    cursor: crosshair;
    box-shadow: 0 6px 18px rgba(0,0,0,.25);
  }
  #mine-hint{
    font-size: .82rem;
    margin-top: .5rem;
    opacity: .7;
  }
  #mine-popup{
    position: fixed;
    left: 50%; top: 30%;
    transform: translate(-50%, -50%) scale(.6);
    background: #1d1d1d;
    color: #ffd83d;
    border: 3px solid #ffd83d;
    padding: 1rem 1.4rem;
    font-family: ui-monospace, monospace;
    font-weight: 700;
    font-size: 1.05rem;
    letter-spacing: 1px;
    pointer-events: none;
    opacity: 0;
    transition: opacity .25s, transform .3s cubic-bezier(.34,1.56,.64,1);
    z-index: 9999;
    box-shadow: 0 0 0 3px #1d1d1d, 0 0 0 6px rgba(255,216,61,.25);
    max-width: 80vw;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #mine-popup.show{ opacity:1; transform: translate(-50%, -50%) scale(1); }
  @media (max-width: 480px){
    #mine-hint{ font-size:.72rem; }
  }
  </style>

  <script>
  (function(){
    const posts = [
      {{- range (where .Site.RegularPages "Type" "posts") }}
      { title: {{ printf "%q" .Title | safeJS }}, url: "{{ .RelPermalink }}" },
      {{- end }}
    ];
    if (!posts.length) return;

    const canvas = document.getElementById('mine-canvas');
    const popup  = document.getElementById('mine-popup');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    const COLS = 16, ROWS = 5, TILE = 32;
    const T = { MINED:0, GRASS:1, DIRT:2, STONE:3, DIAMOND:4, GOLD:5, REDSTONE:6, CREEPER:7 };
    const COLOR = {
      1:{base:'#7CB342', top:'#9CCC65', dark:'#558B2F'},
      2:{base:'#8D6E63', top:'#A1887F', dark:'#5D4037'},
      3:{base:'#9E9E9E', top:'#BDBDBD', dark:'#616161'},
      4:{base:'#4DD0E1', top:'#80DEEA', dark:'#00838F'},
      5:{base:'#FFD83D', top:'#FFE57F', dark:'#F9A825'},
      6:{base:'#E53935', top:'#EF5350', dark:'#B71C1C'},
      7:{base:'#558B2F', top:'#7CB342', dark:'#33691E'},
    };
    const TREASURES = new Set([T.DIAMOND, T.GOLD, T.REDSTONE, T.CREEPER]);
    const LABELS = { 4:'💎 钻石!', 5:'🏆 金锭!', 6:'🔴 红石!', 7:'💚 苦力怕!' };

    let grid = [];

    function gen(){
      grid = [];
      for (let r=0; r<ROWS; r++){
        const row = [];
        for (let c=0; c<COLS; c++){
          row.push(r===0 ? T.GRASS : r===1 ? T.DIRT : T.STONE);
        }
        grid.push(row);
      }
      const treasures = [T.DIAMOND, T.GOLD, T.REDSTONE, T.CREEPER];
      const count = 5 + Math.floor(Math.random()*3);
      for (let i=0; i<count; i++){
        const r = 2 + Math.floor(Math.random()*3);
        const c = Math.floor(Math.random()*COLS);
        grid[r][c] = treasures[Math.floor(Math.random()*treasures.length)];
      }
    }

    function drawTile(c, r, type){
      const x = c*TILE, y = r*TILE;
      if (type === T.MINED){
        ctx.fillStyle = '#87CEEB';
        ctx.fillRect(x, y, TILE, TILE);
        return;
      }
      const col = COLOR[type];
      ctx.fillStyle = col.base;  ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = col.top;   ctx.fillRect(x, y, TILE, 4);
                                  ctx.fillRect(x, y, 4, TILE);
      ctx.fillStyle = col.dark;  ctx.fillRect(x, y+TILE-4, TILE, 4);
                                  ctx.fillRect(x+TILE-4, y, 4, TILE);

      if (type === T.DIAMOND){
        ctx.fillStyle = '#fff';
        ctx.fillRect(x+8,y+8,4,4); ctx.fillRect(x+18,y+18,4,4);
      } else if (type === T.GOLD){
        ctx.fillStyle = '#fff';
        ctx.fillRect(x+12,y+10,4,4);
      } else if (type === T.REDSTONE){
        ctx.fillStyle = '#fff';
        ctx.fillRect(x+10,y+10,3,3); ctx.fillRect(x+18,y+18,3,3);
      } else if (type === T.CREEPER){
        ctx.fillStyle = '#222';
        ctx.fillRect(x+8,y+8,5,5);   ctx.fillRect(x+19,y+8,5,5);
        ctx.fillRect(x+12,y+16,8,4); ctx.fillRect(x+12,y+20,3,4);
        ctx.fillRect(x+17,y+20,3,4);
      } else if (type === T.STONE){
        ctx.fillStyle = col.dark;
        ctx.fillRect(x+10,y+12,3,3); ctx.fillRect(x+20,y+20,3,3);
      } else if (type === T.GRASS){
        ctx.fillStyle = col.dark;
        ctx.fillRect(x+6,y+8,2,2); ctx.fillRect(x+14,y+6,2,2); ctx.fillRect(x+22,y+8,2,2);
      }
    }

    function draw(){
      ctx.fillStyle = '#87CEEB';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      for (let r=0; r<ROWS; r++)
        for (let c=0; c<COLS; c++)
          drawTile(c, r, grid[r][c]);
    }

    function showPopup(msg){
      popup.textContent = msg;
      popup.classList.add('show');
      setTimeout(()=>popup.classList.remove('show'), 1400);
    }

    function pick(clientX, clientY){
      const rect = canvas.getBoundingClientRect();
      const sx = canvas.width / rect.width;
      const sy = canvas.height / rect.height;
      const c = Math.floor((clientX - rect.left) * sx / TILE);
      const r = Math.floor((clientY - rect.top)  * sy / TILE);
      if (r<0||r>=ROWS||c<0||c>=COLS) return;
      const t = grid[r][c];
      if (t === T.MINED) return;
      grid[r][c] = T.MINED;
      draw();

      if (TREASURES.has(t)){
        const post = posts[Math.floor(Math.random()*posts.length)];
        showPopup(`${LABELS[t]} → ${post.title}`);
        setTimeout(()=>{ location.href = post.url; }, 900);
        return;
      }
      if (!grid.flat().some(x => x !== T.MINED)){
        setTimeout(()=>{ gen(); draw(); }, 500);
      }
    }

    canvas.addEventListener('click', e => pick(e.clientX, e.clientY));
    canvas.addEventListener('touchend', e => {
      const t = e.changedTouches && e.changedTouches[0];
      if (!t) return;
      pick(t.clientX, t.clientY);
      e.preventDefault();
    }, {passive:false});

    gen();
    draw();
  })();
  </script>
