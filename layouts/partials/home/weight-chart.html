{{/* 体重走势图 banner —— 读取 data/weight.yaml，零依赖 SVG 折线 + 悬停提示 */}}
{{- with .Site.Data.weight -}}
{{- if .entries -}}
<div id="mantou-weight" aria-label="体重走势图">
  <div id="wt-header">🔥 空腹行动进度图</div>
  <div id="wt-chart" data-points='{{ .entries | jsonify }}'></div>
  <div id="wt-tip" hidden></div>
</div>

<style>
#mantou-weight{
  margin: 1.4rem auto 0;
  max-width: 560px;
  position: relative;
  user-select: none;
}
#wt-header{
  text-align: center;
  font-size: 1.2rem;
  line-height: 1.4;
  margin-bottom: .7rem;
  font-weight: 700;
  letter-spacing: .05em;
}
#wt-chart svg{
  display:block;
  width:100%;
  height:auto;
  border:1px solid rgba(128,128,128,.25);
  border-radius:10px;
  background: linear-gradient(180deg, rgba(46,160,67,.05), rgba(46,160,67,0));
  box-shadow:0 6px 18px rgba(0,0,0,.12);
}
#wt-chart .wt-grid{ stroke: rgba(128,128,128,.18); stroke-width:1; }
#wt-chart .wt-line{ fill:none; stroke:#2ea043; stroke-width:2.4; stroke-linejoin:round; stroke-linecap:round; }
#wt-chart .wt-dot{ fill:#fff; stroke:#2ea043; stroke-width:2; cursor:pointer; transition:r .12s; }
#wt-chart .wt-dot:hover{ r:6; }
#wt-chart .wt-xlabel{ fill: currentColor; opacity:.55; font-size:9px; }
#wt-chart .wt-ylabel{ fill: currentColor; opacity:.45; font-size:9px; }
#wt-tip{
  position:absolute;
  pointer-events:none;
  z-index:50;
  background:#1d1d1f;
  color:#fff;
  padding:.5rem .7rem;
  border-radius:8px;
  font-size:.78rem;
  line-height:1.5;
  white-space:nowrap;
  box-shadow:0 4px 14px rgba(0,0,0,.3);
  transform:translate(-50%, -115%);
}
#wt-tip .wt-tip-d{ color:#2ea043; }
#wt-tip .wt-tip-up{ color:#ff6b6b; }
#wt-tip .wt-tip-down{ color:#54d97a; }
</style>

<script>
(function(){
  const host = document.getElementById('wt-chart');
  if(!host) return;
  let data;
  try{ data = JSON.parse(host.dataset.points); }catch(e){ return; }
  if(!Array.isArray(data) || !data.length) return;
  data = data.filter(d => d && d.date && d.weight != null)
             .sort((a,b)=> a.date < b.date ? -1 : (a.date > b.date ? 1 : 0));
  if(!data.length) return;

  const W=560, H=220, pad={l:32, r:14, t:14, b:24};
  const plotW = W-pad.l-pad.r, plotH = H-pad.t-pad.b;
  const ws = data.map(d=>+d.weight);
  let lo=Math.min(...ws), hi=Math.max(...ws);
  const span=(hi-lo)||1; lo-=span*0.18; hi+=span*0.18;
  const X = i => pad.l + (data.length===1 ? plotW/2 : i/(data.length-1)*plotW);
  const Y = w => pad.t + (hi-w)/(hi-lo)*plotH;
  const md = iso => { const p=iso.split('-'); return (+p[1])+'/'+(+p[2]); };

  // —— 网格 + Y 轴标 ——
  let svg = `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="体重走势">`;
  const ticks=3;
  for(let t=0;t<=ticks;t++){
    const wv = lo + (hi-lo)*t/ticks;
    const yy = Y(wv);
    svg += `<line class="wt-grid" x1="${pad.l}" y1="${yy.toFixed(1)}" x2="${W-pad.r}" y2="${yy.toFixed(1)}"/>`;
    svg += `<text class="wt-ylabel" x="${pad.l-4}" y="${(yy+3).toFixed(1)}" text-anchor="end">${wv.toFixed(0)}</text>`;
  }
  // —— 面积 + 折线 ——
  const linePts = data.map((d,i)=>`${X(i).toFixed(1)},${Y(d.weight).toFixed(1)}`).join(' ');
  const area = `M${X(0).toFixed(1)},${(pad.t+plotH).toFixed(1)} `
    + data.map((d,i)=>`L${X(i).toFixed(1)},${Y(d.weight).toFixed(1)}`).join(' ')
    + ` L${X(data.length-1).toFixed(1)},${(pad.t+plotH).toFixed(1)} Z`;
  svg += `<defs><linearGradient id="wtg" x1="0" y1="0" x2="0" y2="1">`
    + `<stop offset="0%" stop-color="#2ea043" stop-opacity=".28"/>`
    + `<stop offset="100%" stop-color="#2ea043" stop-opacity="0"/></linearGradient></defs>`;
  svg += `<path d="${area}" fill="url(#wtg)"/>`;
  svg += `<polyline class="wt-line" points="${linePts}"/>`;
  // —— X 轴日期 + 数据点 ——
  data.forEach((d,i)=>{
    svg += `<text class="wt-xlabel" x="${X(i).toFixed(1)}" y="${(H-8)}" text-anchor="middle">${md(d.date)}</text>`;
  });
  data.forEach((d,i)=>{
    svg += `<circle class="wt-dot" cx="${X(i).toFixed(1)}" cy="${Y(d.weight).toFixed(1)}" r="3.5" `
      + `data-i="${i}"/>`;
  });
  svg += `</svg>`;
  host.innerHTML = svg;

  // —— 悬停提示 ——
  const tip = document.getElementById('wt-tip');
  const wrap = document.getElementById('mantou-weight');
  function show(i, el){
    const d=data[i], prev = i>0 ? data[i-1] : null;
    let html = `<div class="wt-tip-d">${d.date}</div>`
      + `体重 <b>${d.weight}</b> kg`;
    if(d.bmi!=null) html += ` · BMI <b>${d.bmi}</b>`;
    if(prev){
      const diff=(d.weight-prev.weight);
      const c = diff<=0 ? 'wt-tip-down':'wt-tip-up';
      const s = diff<=0 ? '−':'+';
      html += `<br>比上周 <span class="${c}">${s}${Math.abs(diff).toFixed(1)} kg</span>`;
    }
    tip.innerHTML = html;
    tip.hidden = false;
    const cr = el.getBoundingClientRect();
    const wr = wrap.getBoundingClientRect();
    tip.style.left = (cr.left - wr.left + cr.width/2) + 'px';
    tip.style.top  = (cr.top  - wr.top) + 'px';
  }
  function hide(){ tip.hidden = true; }
  host.querySelectorAll('.wt-dot').forEach(el=>{
    el.addEventListener('mouseenter', ()=>show(+el.dataset.i, el));
    el.addEventListener('mouseleave', hide);
    el.addEventListener('click', ()=>show(+el.dataset.i, el));
  });
  document.addEventListener('click', e=>{ if(!host.contains(e.target)) hide(); });
})();
</script>
{{- end -}}
{{- end -}}
