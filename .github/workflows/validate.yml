name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate Decap CMS admin config
        run: python scripts/validate_admin_config.py

      - name: Validate post filenames vs front-matter dates
        run: python scripts/validate_posts.py
