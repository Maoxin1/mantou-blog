name: Optimize images

# 每当有图片推送到 main（含通过 Decap CMS 网页上传），自动压缩并提交回仓库。
# 你无需在本地做任何事：上传大图后，CI 会自动把它压小再触发 Cloudflare 部署。
on:
  push:
    branches: [main]
    paths:
      - "static/images/**"

permissions:
  contents: write

# 避免与自身的回写提交叠加运行
concurrency:
  group: optimize-images
  cancel-in-progress: false

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow
        run: pip install Pillow

      - name: Compress images in place
        run: python scripts/compress_images.py

      - name: Commit if anything changed
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: 自动压缩图片 [skip ci]"
            git push
          else
            echo "图片已是优化状态，无需改动。"
          fi
