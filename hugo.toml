title = "mantou の blog"
theme = "LoveIt-0.3.0"
baseURL = "https://mantou-blog.pages.dev/"
languageCode = "zh-cn"
hasCJKLanguage = true
buildFuture = true

[social]
  twitter = "mantouaoao"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
  description = "mantou 的个人博客"

# 网站左上角显示的站点名（覆盖主题默认的 "My cool site"）
[params.header.title]
  name = "mantou の blog"

[params.home.profile]
  enable = true
  avatarURL = "/images/mantou.jpg"
  title = "mantou"
  subtitle = "变还是不变？这是个问题..."
  typeit = true
  social = false  # 关闭主页头像下方的社交图标（邮箱 / 推特），更极简

[params.author]
  enable = true
  name = "mantou"
  avatar = "/images/mantou.jpg"
  link = "https://github.com/Maoxin1"

[params.social]
  Email = "2114206091@qq.com"
  twitter = "mantouaoao"

# 统计二选一：已停用 Google Analytics，统一用 Cloudflare Web Analytics
# （脚本见 layouts/partials/analytics.html）。如需恢复 GA，把 enable 改回 true。
[params.analytics]
  enable = false

[params.analytics.google]
  id = "G-0DGXTWGC32"
  anonymizeIP = true

[params.app]
  # 使用 static/ 下生成的标准图标集（favicon.ico / 32 / 16 / apple-touch-icon / site.webmanifest）
  # 不再用照片当 favicon
  title = "mantou の blog"  # 加到主屏/启动器时的应用名（覆盖主题默认的 "My cool site"）
  iconColor = ""  # 置空以禁用主题默认的 mask-icon（safari-pinned-tab.svg 不存在，避免 404）

[params.page]
  lightgallery = true

# 站内搜索改用 Pagefind（页面见 /search/，需配套 Cloudflare 构建命令）；停用主题自带 Lunr
[params.search]
  enable = false

# 关闭主题默认的 jsdelivr CDN，改用本地打包的库文件
# （jsdelivr 在中国大陆常被墙，会导致 lunr 搜索核心、FontAwesome 等加载失败）
[params.cdn]
  data = ""

# 顶部导航：内容二分类（随笔 = 每日；作品 = 精选长文/分析）
# URL 用 ASCII slug（essays/works），避免中文路径在 Cloudflare Pages 上 404
[menu]
  [[menu.main]]
    identifier = "essays"
    name = "随笔"
    url = "/categories/essays/"
    weight = 1
  [[menu.main]]
    identifier = "works"
    name = "作品"
    url = "/categories/works/"
    weight = 2
  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 3

